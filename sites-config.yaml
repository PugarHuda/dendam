# Walrus Sites config (Mainnet) — for Path B in DEPLOY.md.
# Used by: site-builder --config sites-config.yaml deploy ./out
#
# NOTE: the Walrus Sites package/object addresses on Mainnet can change across
# releases. The site-builder installed via `suiup install site-builder@mainnet`
# usually ships with the correct default config — you can often just run
# `site-builder deploy ./out` without this file. Use this template only if you
# need to override, and align it with the latest official values from
# https://docs.wal.app/walrus-sites/

contexts:
  mainnet:
    # Sui Mainnet RPC endpoint
    rpc_url: https://fullnode.mainnet.sui.io:443
    # Wallet to pay gas + storage (use your dedicated SUI wallet for Sessions).
    wallet: ~/.sui/sui_config/client.yaml
    # Walrus Sites package address on Mainnet — fill from official docs if overriding.
    # package: "0x..."
    # Walrus aggregator/publisher (optional override).
    # walrus_config: ~/.config/walrus/client_config.yaml

default_context: mainnet
